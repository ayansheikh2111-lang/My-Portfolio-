<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Calculator | Abdul Ayan Sheikh</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="calculator">

        <div class="calculator-header">

            <h1>Calculator</h1>

            <p>
                A functional calculator built with
                HTML, CSS and JavaScript.
            </p>

        </div>


        <div class="display">

            <div id="previous">
            </div>

            <div id="current">
                0
            </div>

        </div>


        <div class="buttons">

            <button
                class="span-two"
                data-action="clear">
                AC
            </button>

            <button
                data-action="delete">
                DEL
            </button>

            <button
                class="operator"
                data-operation="÷">
                ÷
            </button>


            <button data-number="7">
                7
            </button>

            <button data-number="8">
                8
            </button>

            <button data-number="9">
                9
            </button>

            <button
                class="operator"
                data-operation="×">
                ×
            </button>


            <button data-number="4">
                4
            </button>

            <button data-number="5">
                5
            </button>

            <button data-number="6">
                6
            </button>

            <button
                class="operator"
                data-operation="-">
                −
            </button>


            <button data-number="1">
                1
            </button>

            <button data-number="2">
                2
            </button>

            <button data-number="3">
                3
            </button>

            <button
                class="operator"
                data-operation="+">
                +
            </button>


            <button data-number="0">
                0
            </button>

            <button data-number=".">
                .
            </button>

            <button
                class="equals"
                data-action="equals">
                =
            </button>

        </div>


        <a href="../../index.html"
           class="back-button">

            ← Back to Portfolio

        </a>

    </div>


    <script src="script.js"></script>

</body>

              </html>
